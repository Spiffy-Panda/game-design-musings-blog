# Deploy the static site in `site/` to GitHub Pages.
#
# Publishes to: https://<username>.github.io/game-design-musings-blog/
# One-time setup (repo Settings -> Pages): set "Source" to "GitHub Actions".
#
# Preview the same content locally with: python utils/python/serve_site.py
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
