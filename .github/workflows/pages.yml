# Deploy the static site in `site/` to GitHub Pages.
#
# Publishes to: https://<username>.github.io/game-design-musings-blog/
# One-time setup (repo Settings -> Pages): set "Source" to "GitHub Actions".
#
# Preview the same content locally with: python utils/python/serve_site.py
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege permissions the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Set up Node
        # Needed to build the approaches React app (approaches-app/). build_site.py runs
        # `npm ci` + `npm run build` for it and copies the output into site/.
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build site
        # Renders every musing + regenerates site/index.html from MUSING-CONFIG.json, then
        # builds the approaches React app and copies it into site/. No --drafts, so
        # "hidden": true musings are never published.
        run: python utils/python/build_site.py
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
