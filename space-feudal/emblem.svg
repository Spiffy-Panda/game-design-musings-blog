<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
  <!-- Space Feudal seal: a font system in miniature — the star and its keep in the
       Deep, lane mouths out in the Shallows. Colors from the row's --m-* tokens. -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="var(--m-line, #d8d1bf)" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="87" fill="none" stroke="var(--m-muted, #7d7663)" stroke-width="0.8" opacity=".8"/>

  <!-- the font star, its bloom, the orbits -->
  <circle cx="62" cy="108" r="8" fill="var(--m-accent3, #8c3a24)" opacity=".9"/>
  <circle cx="62" cy="108" r="13" fill="none" stroke="var(--m-accent3, #8c3a24)" stroke-width="1" opacity=".6"/>
  <circle cx="62" cy="108" r="22" fill="none" stroke="var(--m-accent3, #8c3a24)" stroke-width="0.9" stroke-dasharray="2 4" opacity=".55"/>
  <circle cx="62" cy="108" r="34" fill="none" stroke="var(--m-muted, #7d7663)" stroke-width="0.8" stroke-dasharray="1 6" opacity=".6"/>
  <circle cx="62" cy="108" r="46" fill="none" stroke="var(--m-muted, #7d7663)" stroke-width="0.8" stroke-dasharray="1 6" opacity=".45"/>

  <!-- the keep -->
  <rect x="82.5" y="82.5" width="9" height="9" transform="rotate(45 87 87)" fill="var(--m-accent2, #8a6d1f)" stroke="var(--m-ink, #28241d)" stroke-width="0.8"/>

  <!-- transit lines -->
  <line x1="92" y1="82" x2="128" y2="70" stroke="var(--m-muted, #7d7663)" stroke-width="1" stroke-dasharray="4 4" opacity=".8"/>
  <line x1="72" y1="116" x2="140" y2="136" stroke="var(--m-muted, #7d7663)" stroke-width="1" stroke-dasharray="4 4" opacity=".55"/>

  <!-- the fortified mouth, its seasonal drift -->
  <ellipse cx="140" cy="66" rx="14" ry="6" fill="none" stroke="var(--m-ink, #28241d)" stroke-width="1.3" transform="rotate(-18 140 66)"/>
  <ellipse cx="140" cy="66" rx="24" ry="11" fill="none" stroke="var(--m-line, #d8d1bf)" stroke-width="1" stroke-dasharray="3 4" transform="rotate(-18 140 66)"/>
  <line x1="152" y1="57" x2="168" y2="46" stroke="var(--m-accent, #274d8d)" stroke-width="1.3" stroke-dasharray="6 3"/>
  <polygon points="168,46 160,48 164,54" fill="var(--m-accent, #274d8d)"/>

  <!-- the smugglers' door -->
  <ellipse cx="148" cy="140" rx="10" ry="4.5" fill="none" stroke="var(--m-muted, #7d7663)" stroke-width="1" transform="rotate(20 148 140)"/>
  <ellipse cx="148" cy="140" rx="17" ry="8" fill="none" stroke="var(--m-line, #d8d1bf)" stroke-width="0.9" stroke-dasharray="3 4" transform="rotate(20 148 140)"/>
</svg>
